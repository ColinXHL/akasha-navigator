name: Update Qiniu Notice
run-name: "Update notice ${{ github.event.client_payload.version || github.event.inputs.version }}"

on:
  repository_dispatch:
    types:
      - automation_plugin_released
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.0.0 / 1.1.0-alpha.3）"
        required: true
        type: string
      channel:
        description: "更新通道"
        required: true
        type: choice
        default: stable
        options:
          - stable
          - alpha
      min_required_version:
        description: "最低强制升级版本"
        required: true
        type: string
      notes:
        description: "更新说明"
        required: false
        default: ""
        type: string
      source:
        description: "下载源标识"
        required: true
        default: qiniu
        type: string
      plugin_version:
        description: "Akasha Automation 插件版本（留空则不更新插件目录）"
        required: false
        default: ""
        type: string
      plugin_min_host_version:
        description: "插件要求的最低 AkashaNavigator 版本"
        required: false
        default: "1.4.0-alpha.1"
        type: string
      plugin_resource_min_version:
        description: "插件资源要求的最低插件版本（留空则不更新）"
        required: false
        default: ""
        type: string
      plugin_package_size:
        description: "插件 ZIP 字节数"
        required: false
        default: ""
        type: string
      plugin_package_sha256:
        description: "插件 ZIP SHA-256"
        required: false
        default: ""
        type: string
      plugin_github_url:
        description: "插件 GitHub Release 下载地址"
        required: false
        default: ""
        type: string
      plugin_cnb_url:
        description: "插件 CNB Release 下载地址"
        required: false
        default: ""
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      channel: ${{ steps.validate.outputs.channel }}
      min_required_version: ${{ steps.validate.outputs.min_required_version }}
      installer_name: ${{ steps.validate.outputs.installer_name }}
      notes: ${{ steps.validate.outputs.notes }}
      source: ${{ steps.validate.outputs.source }}
      plugin_only: ${{ steps.validate.outputs.plugin_only }}
      plugin_version: ${{ steps.validate.outputs.plugin_version }}
      plugin_min_host_version: ${{ steps.validate.outputs.plugin_min_host_version }}
      plugin_resource_min_version: ${{ steps.validate.outputs.plugin_resource_min_version }}
      plugin_package_size: ${{ steps.validate.outputs.plugin_package_size }}
      plugin_package_sha256: ${{ steps.validate.outputs.plugin_package_sha256 }}
      plugin_github_url: ${{ steps.validate.outputs.plugin_github_url }}
      plugin_cnb_url: ${{ steps.validate.outputs.plugin_cnb_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate inputs
        id: validate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_MIN_REQUIRED_VERSION: ${{ github.event.inputs.min_required_version }}
          INPUT_NOTES: ${{ github.event.inputs.notes }}
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_PLUGIN_VERSION: ${{ github.event.inputs.plugin_version }}
          INPUT_PLUGIN_MIN_HOST_VERSION: ${{ github.event.inputs.plugin_min_host_version }}
          INPUT_PLUGIN_RESOURCE_MIN_VERSION: ${{ github.event.inputs.plugin_resource_min_version }}
          INPUT_PLUGIN_PACKAGE_SIZE: ${{ github.event.inputs.plugin_package_size }}
          INPUT_PLUGIN_PACKAGE_SHA256: ${{ github.event.inputs.plugin_package_sha256 }}
          INPUT_PLUGIN_GITHUB_URL: ${{ github.event.inputs.plugin_github_url }}
          INPUT_PLUGIN_CNB_URL: ${{ github.event.inputs.plugin_cnb_url }}
          DISPATCH_PLUGIN_VERSION: ${{ github.event.client_payload.version }}
          DISPATCH_PLUGIN_MIN_HOST_VERSION: ${{ github.event.client_payload.min_host_version }}
          DISPATCH_PLUGIN_PACKAGE_SIZE: ${{ github.event.client_payload.package_size }}
          DISPATCH_PLUGIN_PACKAGE_SHA256: ${{ github.event.client_payload.package_sha256 }}
          DISPATCH_PLUGIN_GITHUB_URL: ${{ github.event.client_payload.github_url }}
          DISPATCH_PLUGIN_CNB_URL: ${{ github.event.client_payload.cnb_url }}
        run: |
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' AkashaNavigator/AkashaNavigator.csproj)
          PLUGIN_ONLY=false

          if [[ "$EVENT_NAME" == "repository_dispatch" ]]; then
            PLUGIN_ONLY=true
            VERSION="$CSPROJ_VERSION"
            CHANNEL="stable"
            MIN_REQUIRED_VERSION="0.0.0"
            NOTES=""
            SOURCE="qiniu"
            PLUGIN_VERSION="$DISPATCH_PLUGIN_VERSION"
            PLUGIN_MIN_HOST_VERSION="$DISPATCH_PLUGIN_MIN_HOST_VERSION"
            PLUGIN_RESOURCE_MIN_VERSION=""
            PLUGIN_PACKAGE_SIZE="$DISPATCH_PLUGIN_PACKAGE_SIZE"
            PLUGIN_PACKAGE_SHA256="$DISPATCH_PLUGIN_PACKAGE_SHA256"
            PLUGIN_GITHUB_URL="$DISPATCH_PLUGIN_GITHUB_URL"
            PLUGIN_CNB_URL="$DISPATCH_PLUGIN_CNB_URL"
          else
            VERSION="$INPUT_VERSION"
            CHANNEL="$INPUT_CHANNEL"
            MIN_REQUIRED_VERSION="$INPUT_MIN_REQUIRED_VERSION"
            NOTES="$INPUT_NOTES"
            SOURCE="$INPUT_SOURCE"
            PLUGIN_VERSION="$INPUT_PLUGIN_VERSION"
            PLUGIN_MIN_HOST_VERSION="$INPUT_PLUGIN_MIN_HOST_VERSION"
            PLUGIN_RESOURCE_MIN_VERSION="$INPUT_PLUGIN_RESOURCE_MIN_VERSION"
            PLUGIN_PACKAGE_SIZE="$INPUT_PLUGIN_PACKAGE_SIZE"
            PLUGIN_PACKAGE_SHA256="$INPUT_PLUGIN_PACKAGE_SHA256"
            PLUGIN_GITHUB_URL="$INPUT_PLUGIN_GITHUB_URL"
            PLUGIN_CNB_URL="$INPUT_PLUGIN_CNB_URL"
          fi

          # 自动生成安装包文件名
          INSTALLER_NAME="AkashaNavigator.Install.${VERSION}.exe"

          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'

          if ! [[ "$VERSION" =~ $SEMVER_REGEX ]]; then
            echo "❌ version 不符合语义化版本"
            exit 1
          fi

          if ! [[ "$MIN_REQUIRED_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "❌ min_required_version 不符合语义化版本"
            exit 1
          fi

          echo "输入版本: $VERSION"
          echo "csproj版本: $CSPROJ_VERSION"
          echo "安装包名称: $INSTALLER_NAME"

          if [[ "$PLUGIN_ONLY" != "true" && "$VERSION" != "$CSPROJ_VERSION" ]]; then
            echo "❌ 输入版本号与 csproj 中 <Version> 不一致"
            exit 1
          fi

          if [[ "$PLUGIN_ONLY" == "true" && -z "$PLUGIN_VERSION" ]]; then
            echo "❌ 插件发布事件缺少 version"
            exit 1
          fi

          if [[ -n "$PLUGIN_VERSION" ]]; then
            if ! [[ "$PLUGIN_VERSION" =~ $SEMVER_REGEX ]]; then
              echo "❌ plugin_version 不符合语义化版本"
              exit 1
            fi
            if ! [[ "$PLUGIN_MIN_HOST_VERSION" =~ $SEMVER_REGEX ]]; then
              echo "❌ plugin_min_host_version 不符合语义化版本"
              exit 1
            fi
            if [[ -n "$PLUGIN_RESOURCE_MIN_VERSION" ]] && ! [[ "$PLUGIN_RESOURCE_MIN_VERSION" =~ $SEMVER_REGEX ]]; then
              echo "❌ plugin_resource_min_version 不符合语义化版本"
              exit 1
            fi
            if ! [[ "$PLUGIN_PACKAGE_SIZE" =~ ^[1-9][0-9]*$ ]]; then
              echo "❌ plugin_package_size 必须是正整数"
              exit 1
            fi
            if ! [[ "$PLUGIN_PACKAGE_SHA256" =~ ^[0-9a-fA-F]{64}$ ]]; then
              echo "❌ plugin_package_sha256 必须是 64 位十六进制字符串"
              exit 1
            fi
            if [[ "$PLUGIN_GITHUB_URL" != https://* || "$PLUGIN_CNB_URL" != https://* ]]; then
              echo "❌ 插件下载地址必须使用 HTTPS"
              exit 1
            fi
          fi

          if [[ "$PLUGIN_ONLY" != "true" ]]; then
            case "$CHANNEL" in
              stable|alpha) ;;
              *)
                echo "❌ channel 只能是 stable 或 alpha"
                exit 1
                ;;
            esac

            if [[ "$CHANNEL" == "stable" && "$VERSION" == *"-"* ]]; then
              echo "❌ stable 通道不应使用预发布版本号"
              exit 1
            fi

            if [[ "$CHANNEL" == "alpha" && "$VERSION" != *"-"* ]]; then
              echo "⚠️ alpha 通道通常建议使用预发布版本号，例如 1.1.0-alpha.3"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "min_required_version=$MIN_REQUIRED_VERSION" >> "$GITHUB_OUTPUT"
          echo "installer_name=$INSTALLER_NAME" >> "$GITHUB_OUTPUT"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "plugin_only=$PLUGIN_ONLY" >> "$GITHUB_OUTPUT"
          echo "plugin_version=$PLUGIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_min_host_version=$PLUGIN_MIN_HOST_VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_resource_min_version=$PLUGIN_RESOURCE_MIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_package_size=$PLUGIN_PACKAGE_SIZE" >> "$GITHUB_OUTPUT"
          echo "plugin_package_sha256=$PLUGIN_PACKAGE_SHA256" >> "$GITHUB_OUTPUT"
          echo "plugin_github_url=$PLUGIN_GITHUB_URL" >> "$GITHUB_OUTPUT"
          echo "plugin_cnb_url=$PLUGIN_CNB_URL" >> "$GITHUB_OUTPUT"
          echo "✅ 参数校验通过"

  build_notice:
    runs-on: ubuntu-latest
    needs: [validate]
    outputs:
      notice_file: ${{ steps.generate.outputs.notice_file }}
    steps:
      - uses: actions/checkout@v5

      - name: Download existing notice.json from Qiniu
        shell: bash
        env:
          QINIU_NOTICE_URL: ${{ secrets.QINIU_NOTICE_URL }}
        run: |
          mkdir -p out
          HTTP_STATUS=$(curl \
            --silent \
            --show-error \
            --location \
            --output out/notice_existing.json \
            --write-out "%{http_code}" \
            "$QINIU_NOTICE_URL")

          if [[ "$HTTP_STATUS" == "200" ]]; then
            python -m json.tool out/notice_existing.json >/dev/null
            echo "✅ 下载现有 notice.json 成功"
            cat out/notice_existing.json
          elif [[ "$HTTP_STATUS" == "404" ]]; then
            echo "⚠️ 未找到现有 notice.json，将创建新文件"
            echo '{"stable":{"version":"0.0.0","installer":"","source":"qiniu","notes":""},"alpha":{"version":"0.0.0","installer":"","source":"qiniu","notes":""},"min_required_version":"1.0.0"}' > out/notice_existing.json
          else
            echo "❌ 下载现有 notice.json 失败，HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Generate notice.json
        id: generate
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          CHANNEL: ${{ needs.validate.outputs.channel }}
          MIN_REQUIRED_VERSION: ${{ needs.validate.outputs.min_required_version }}
          INSTALLER_NAME: ${{ needs.validate.outputs.installer_name }}
          NOTES: ${{ needs.validate.outputs.notes }}
          SOURCE: ${{ needs.validate.outputs.source }}
          PLUGIN_ONLY: ${{ needs.validate.outputs.plugin_only }}
          PLUGIN_VERSION: ${{ needs.validate.outputs.plugin_version }}
          PLUGIN_MIN_HOST_VERSION: ${{ needs.validate.outputs.plugin_min_host_version }}
          PLUGIN_RESOURCE_MIN_VERSION: ${{ needs.validate.outputs.plugin_resource_min_version }}
          PLUGIN_PACKAGE_SIZE: ${{ needs.validate.outputs.plugin_package_size }}
          PLUGIN_PACKAGE_SHA256: ${{ needs.validate.outputs.plugin_package_sha256 }}
          PLUGIN_GITHUB_URL: ${{ needs.validate.outputs.plugin_github_url }}
          PLUGIN_CNB_URL: ${{ needs.validate.outputs.plugin_cnb_url }}
        run: |
          python - <<'PY'
          import json
          import os

          version = os.environ["VERSION"]
          channel = os.environ["CHANNEL"]
          min_required_version = os.environ["MIN_REQUIRED_VERSION"]
          installer_name = os.environ["INSTALLER_NAME"]
          notes = os.environ["NOTES"]
          source = os.environ["SOURCE"]
          plugin_version = os.environ.get("PLUGIN_VERSION", "").strip()
          plugin_only = os.environ.get("PLUGIN_ONLY", "false") == "true"

          with open("out/notice_existing.json", "r", encoding="utf-8") as f:
              data = json.load(f)
              print("✅ 读取现有配置成功")

          if not plugin_only:
              # 手动发布应用时只更新指定通道。
              data[channel] = {
                  "version": version,
                  "installer": installer_name,
                  "source": source,
                  "notes": notes
              }
              data["min_required_version"] = min_required_version

          if plugin_version:
              plugin_id = "akasha-genshin-automation"
              plugins = data.setdefault("plugins", {})
              plugin = plugins.setdefault(plugin_id, {})
              plugin.update({
                  "name": "Akasha 原神自动化",
                  "version": plugin_version,
                  "minHostVersion": os.environ["PLUGIN_MIN_HOST_VERSION"],
                  "package": {
                      "fileName": f"{plugin_id}-v{plugin_version}.zip",
                      "size": int(os.environ["PLUGIN_PACKAGE_SIZE"]),
                      "sha256": os.environ["PLUGIN_PACKAGE_SHA256"].lower(),
                      "sources": [
                          {
                              "id": "github",
                              "url": os.environ["PLUGIN_GITHUB_URL"]
                          },
                          {
                              "id": "cnb",
                              "url": os.environ["PLUGIN_CNB_URL"]
                          }
                      ]
                  }
              })
              resource_min_version = os.environ.get(
                  "PLUGIN_RESOURCE_MIN_VERSION", ""
              ).strip()
              if resource_min_version:
                  resources = plugin.get("resources")
                  pick_blacklist = (
                      resources.get("pickBlacklist")
                      if isinstance(resources, dict)
                      else None
                  )
                  if not isinstance(pick_blacklist, dict):
                      raise ValueError(
                          "Existing notice must contain pickBlacklist before "
                          "updating plugin_resource_min_version"
                      )
                  pick_blacklist["minPluginVersion"] = resource_min_version
                  print(
                      "✅ 更新远程插件资源最低版本: "
                      f"pickBlacklist >= {resource_min_version}"
                  )
              data["schemaVersion"] = 2
              print(f"✅ 更新远程插件目录: {plugin_id} v{plugin_version}")

          if not plugin_only:
              print(f"✅ 更新 {channel} 通道: {version}")

          # 写入压缩格式的 JSON（无缩进、无空格）
          with open("out/notice.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, separators=(',', ':'))
          PY

          echo "notice_file=out/notice.json" >> "$GITHUB_OUTPUT"

      - name: Show generated notice.json
        run: cat out/notice.json

      - uses: actions/upload-artifact@v6
        with:
          name: qiniu_notice
          path: out/notice.json

  upload_notice:
    runs-on: windows-latest
    needs: [build_notice]
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: qiniu_notice
          path: out

      - name: Download qshell
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/qiniu/qshell/releases/download/v2.18.0/qshell-v2.18.0-windows-amd64.zip" `
            -OutFile "qshell.zip"
          Expand-Archive -Path "qshell.zip" -DestinationPath ".\qshell_bin" -Force
          Get-ChildItem .\qshell_bin -Recurse

      - name: Configure qshell account
        shell: pwsh
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
        run: |
          $qshell = (Get-ChildItem .\qshell_bin -Recurse -Filter qshell*.exe | Select-Object -First 1).FullName
          & $qshell account $env:QINIU_ACCESS_KEY $env:QINIU_SECRET_KEY github-actions

      - name: Upload notice.json to Qiniu
        shell: pwsh
        env:
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
          QINIU_NOTICE_KEY: ${{ secrets.QINIU_NOTICE_KEY }}
        run: |
          $qshell = (Get-ChildItem .\qshell_bin -Recurse -Filter qshell*.exe | Select-Object -First 1).FullName

          # 单文件上传，使用 fput 并添加 --overwrite 参数
          & $qshell fput $env:QINIU_BUCKET $env:QINIU_NOTICE_KEY .\out\notice.json --overwrite

      - name: Refresh CDN cache
        shell: pwsh
        env:
          QINIU_NOTICE_URL: ${{ secrets.QINIU_NOTICE_URL }}
        run: |
          $qshell = (Get-ChildItem .\qshell_bin -Recurse -Filter qshell*.exe | Select-Object -First 1).FullName

          # 刷新 CDN 缓存
          Write-Host "刷新 CDN 缓存: $env:QINIU_NOTICE_URL"
          echo $env:QINIU_NOTICE_URL | & $qshell cdnrefresh

      - name: Done
        run: echo "✅ notice.json 已上传并刷新 CDN 缓存"
