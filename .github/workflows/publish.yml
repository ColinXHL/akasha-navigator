name: AkashaNavigator Publish
run-name: "AkashaNavigator ${{ github.event.inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "AkashaNavigator Version (e.g., 0.1.0, 0.1.1-alpha.1)"
        required: true
        type: string
      channel:
        description: "发布通道"
        type: choice
        required: true
        default: "release"
        options:
          - release
          - dev
      create_release:
        description: "是否创建 GitHub Release 草稿"
        required: true
        default: false
        type: boolean
      push_to_cnb:
        description: "是否触发 CNB 推送"
        required: true
        default: true
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Set version from input or tag
        id: set-version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            # 更简单安全的正则，兼容 0.2.0、0.2.0-alpha 等
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "❌ 错误：版本格式必须符合语义化版本规范 (例如: 1.2.3, 1.2.3-alpha, 1.2.3+build.123)"
              exit 1
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "✨ 手动触发构建，版本号：$VERSION"
          else
            # Extract version from tag name (remove 'v' prefix)
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "🏷️ 从 tag 触发构建，版本号：$VERSION"
          fi

      - name: Verify version matches csproj
        run: |
          VERSION="${{ steps.set-version.outputs.version }}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' AkashaNavigator/AkashaNavigator.csproj)
          echo "📋 输入版本号: $VERSION"
          echo "📋 csproj 版本号: $CSPROJ_VERSION"
          if [[ "$VERSION" != "$CSPROJ_VERSION" ]]; then
            echo "❌ 错误：输入的版本号 ($VERSION) 与 csproj 中的版本号 ($CSPROJ_VERSION) 不匹配！"
            echo "请先更新 AkashaNavigator/AkashaNavigator.csproj 中的 <Version> 标签。"
            exit 1
          fi
          echo "✅ 版本号匹配"

  build_dist:
    runs-on: windows-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x

      - name: 🛠️ Publish AkashaNavigator
        run: |
          dotnet publish AkashaNavigator/AkashaNavigator.csproj `
            -c Release `
            -p:PublishProfile=FolderProfile `
            /p:Version=${{ needs.validate.outputs.version }}

      - name: 🧹 Collect publish files
        run: |
          $sourceDir = ".\AkashaNavigator\bin\Release\net8.0-windows\win-x64\publish"
          # 清理 dist/AkashaNavigator 目录，避免权限问题
          if (Test-Path ".\dist\AkashaNavigator") {
              Remove-Item -Recurse -Force ".\dist\AkashaNavigator"
          }
          New-Item -ItemType Directory -Path ".\dist\AkashaNavigator"
          Copy-Item "$sourceDir\*" ".\dist\AkashaNavigator" -Recurse -Force
          # 可选：删除无用文件
          Get-ChildItem ".\dist\AkashaNavigator" -Recurse -Include *.pdb,*.lib | Remove-Item -Force

      - name: 📥 Download kachina-builder
        # 先生成本地 updater，确保便携包内自带 AkashaNavigator.update.exe
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download `
            --repo YuehaiTeam/kachina-installer `
            --pattern "kachina-builder.exe" `
            --dir .

      - name: ⚙️ Generate updater executable
        # 生成 dist/AkashaNavigator/AkashaNavigator.update.exe，然后再打 7z
        shell: pwsh
        run: |
          .\kachina-builder.exe pack `
            -c .\Build\kachina.config.json `
            -o .\dist\AkashaNavigator\AkashaNavigator.update.exe

          if (!(Test-Path ".\dist\AkashaNavigator\AkashaNavigator.update.exe")) {
            Write-Error "AkashaNavigator.update.exe 生成失败"
            exit 1
          }

      - name: 📦 Pack 7z
        run: |
          cd dist
          7z a "AkashaNavigator_v${{ needs.validate.outputs.version }}.7z" AkashaNavigator -t7z -mx=5 -r -y

      - uses: actions/upload-artifact@v6
        with:
          name: AkashaNavigator_7z
          path: dist/AkashaNavigator_v*.7z

  build_installer:
    runs-on: windows-latest
    needs: [validate, build_dist]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          name: AkashaNavigator_7z
          path: dist

      - name: 📦 Unpack
        run: |
          cd dist
          Write-Host "当前目录：$(Get-Location)"
          Write-Host "Unpack 前文件列表："
          Get-ChildItem -Recurse | ForEach-Object { Write-Host $_.FullName }
          7z x "AkashaNavigator_v${{ needs.validate.outputs.version }}.7z"
          Write-Host "Unpack 后文件列表："
          Get-ChildItem -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: 📥 Download kachina-builder
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "当前目录：$(Get-Location)"
          gh release download `
            --repo YuehaiTeam/kachina-installer `
            --pattern "kachina-builder.exe" `
            --dir .
          
          Write-Host "下载后文件列表："
          Get-ChildItem -Recurse | Where-Object { $_.Name -like "*kachina-builder*" } | ForEach-Object { Write-Host $_.FullName }

      - name: 🧰 Generate hashed directory for packing
        shell: pwsh
        run: |
          cd dist
          Write-Host "当前目录：$(Get-Location)"
          Write-Host "生成 hashed 临时目录..."
          
          ..\kachina-builder.exe gen `
            -j 4 `
            -i AkashaNavigator `
            -m metadata.json `
            -o hashed `
            -r ColinXHL/akasha-navigator `
            -t ${{ needs.validate.outputs.version }} `
            -u .\AkashaNavigator\AkashaNavigator.update.exe
          
          Write-Host "hashed 目录内容："
          Get-ChildItem hashed -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: 🧰 Pack Installer
        shell: pwsh
        run: |
          cd dist
          Write-Host "开始打包 installer..."
          
          ..\kachina-builder.exe pack `
            -c ..\Build\kachina.config.json `
            -m metadata.json `
            -t ..\assets\installer_left.webp `
            -d hashed `
            -o AkashaNavigator.Install.${{ needs.validate.outputs.version }}.exe
          
          Write-Host "打包完成"

      - uses: actions/upload-artifact@v6
        with:
          name: AkashaNavigator_Installer
          path: dist/AkashaNavigator.Install.*.exe

  cnb_trigger:
    name: Trigger CNB Build
    if: github.event.inputs.push_to_cnb == 'true' && github.repository_owner == 'ColinXHL'
    runs-on: ubuntu-latest
    needs: [validate, build_dist, build_installer]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Trigger CNB Build
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          python .github/workflows/cnb_trigger.py "$CNB_TOKEN" --runid ${{ github.run_id }}

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build_installer
    permissions:
      contents: write
    if: github.event.inputs.create_release == 'true'

    steps:
      - uses: actions/download-artifact@v7
        with:
          name: AkashaNavigator_Installer
          path: release

      - uses: actions/download-artifact@v7
        with:
          name: AkashaNavigator_7z
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: AkashaNavigator v${{ needs.validate.outputs.version }}
          draft: true
          prerelease: ${{ github.event.inputs.channel == 'dev' }}
          fail_on_unmatched_files: true
          files: |
            release/AkashaNavigator.Install.*.exe
            release/AkashaNavigator_v*.7z
